<div class="arc-loader" role="status" aria-label="Loading">
  <svg viewBox="0 0 50 50" class="arc-svg">
    <circle class="arc"
            cx="25" cy="25" r="20"
            fill="none"
            stroke-width="5"
            stroke-linecap="round" />
  </svg>
</div>

<style>
  .arc-loader{
    --size: 120px;     /* make it bigger/smaller */
    --speed: 1.2s;     /* overall speed */
    --color: #3498db;  /* solid color fallback */

    width: var(--size);
    height: var(--size);
    display: inline-block;
  }

    .arc-svg {
    width: 100%;
    height: 100%;
    animation: rotate var(--speed) linear infinite;

    /* ✅ force start/end at the right (3 o’clock) */
    transform-origin: center;
    transform: rotate(0deg);
    }

  .arc{
    stroke: var(--color);

    /* Only show an arc segment of the circle */
    stroke-dasharray: 1, 200;
    stroke-dashoffset: 0;

    /* This animation makes the arc grow/shrink AND "reset" (disappear/reappear) */
    animation: dash var(--speed) ease-in-out infinite;
  }

  @keyframes rotate {
    to { transform: rotate(360deg); }
  }

  @keyframes dash {
    /* start nearly invisible */
    0%   { stroke-dasharray: 1, 200;   stroke-dashoffset: 0;    opacity: 1; }
    /* grow arc */
    40%  { stroke-dasharray: 90, 200;  stroke-dashoffset: -20;  opacity: 1; }
    /* shrink arc while moving forward */
    70%  { stroke-dasharray: 90, 200;  stroke-dashoffset: -120; opacity: 1; }
    /* fade out so it "disappears" before restart */
    95%  { opacity: 0; }
    /* reset to tiny arc (invisible-ish) */
    100% { stroke-dasharray: 1, 200;   stroke-dashoffset: -200; opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce){
    .arc-svg, .arc{ animation: none; }
  }
</style>
